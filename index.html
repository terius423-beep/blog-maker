<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 콘텐츠 & 컨셉 자동 생성기</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 24px; text-align: center; color: #2c3e50; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px; }
        select, input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; min-height: 120px; }
        button { width: 100%; background: #2980b9; color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:hover { background: #3498db; }
        .result-box { margin-top: 25px; padding: 15px; background: #e8f4f8; border-radius: 8px; display: none; }
        .result-box h3 { margin-top: 0; color: #2980b9; }
        #loader { text-align: center; display: none; margin-top: 15px; font-weight: bold; color: #e74c3c; }
        textarea.output-area { background: #f9f9f9; min-height: 200px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 SEO 블로그 생성기</h1>
    
    <label for="apiKey">Gemini API 키 (보안 주의)</label>
    <input type="password" id="apiKey" placeholder="API 키를 입력하세요">

    <label for="brandSelect">운영 브랜드 선택</label>
    <select id="brandSelect">
        <option value="general">일반 SEO 블로그</option>
        <option value="re_enter">리엔터 (행사/중계 전문 에이전시)</option>
        <option value="chew_jp">씹어먹는 일본어 (어학/교육)</option>
    </select>

    <label for="keyword">타겟 키워드 (검색어)</label>
    <input type="text" id="keyword" placeholder="예: 체육대회 MC 섭외, 기초 일본어 문법 등">

    <label for="sourceInfo">핵심 정보 소스 (내용, 레퍼런스, URL 등)</label>
    <textarea id="sourceInfo" placeholder="AI가 이 내용을 바탕으로 글을 작성합니다. 요약본, 현장 스케치, 다뤄야 할 필수 내용 등을 적어주세요."></textarea>

    <button onclick="generateBlog()">분석 및 글 생성하기</button>

    <div id="loader">AI가 시장을 분석하고 글을 작성 중입니다... (약 10~20초 소요)</div>

    <div class="result-box" id="resultContainer">
        <h3>📊 1. 콘텐츠 기획 및 컨셉 분석</h3>
        <textarea id="analysisOutput" class="output-area" readonly></textarea>
        
        <h3 style="margin-top: 20px;">📝 2. 완성된 블로그 본문 (HTML)</h3>
        <textarea id="blogOutput" class="output-area" readonly></textarea>
    </div>
</div>

<script>
    async function generateBlog() {
        const apiKey = document.getElementById('apiKey').value;
        const brand = document.getElementById('brandSelect').value;
        const keyword = document.getElementById('keyword').value;
        const sourceInfo = document.getElementById('sourceInfo').value;
        
        if(!apiKey || !keyword) {
            alert("API 키와 타겟 키워드를 입력해주세요.");
            return;
        }

        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultContainer').style.display = 'none';

        // 1. 브랜드별 프롬프트 분기 세팅
        let personaContext = "";
        let formatRules = "";

        if (brand === "re_enter") {
            personaContext = "당신은 스포츠 캐스터이자 현장 행사 MC 전문 에이전시를 운영하는 대표입니다. 뉴스 앵커와 같은 정형화된 톤보다는, 생동감 있는 현장 중계 경험과 실전 행사 진행의 전문성을 강조하는 페르소나를 유지해야 합니다.";
            formatRules = "제공된 '정보 소스'를 바탕으로 현장의 생생함과 섭외 시의 전문적인 기대 효과를 강조하여 SEO에 맞게 작성하세요. <h2>, <h3> 등의 태그를 사용하여 가독성을 높이세요.";
        } else if (brand === "chew_jp") {
            personaContext = "당신은 체계적인 일본어 교육 브랜드의 기획자이자 대표입니다. 직접 가르치는 강사가 아니라, 전문 코치진이 교육하는 시스템을 총괄하고 수강생의 동기부여를 돕는 역할을 합니다.";
            formatRules = `
            반드시 다음 HTML 구조와 요소를 지켜서 작성해야 합니다:
            1. '이강준의 씹어먹는 일본어' 브랜딩 문구를 포함할 것.
            2. 검색이 잘 되는 매력적인 제목(Title)과 시선을 끄는 후킹(Hooking) 도입부.
            3. 본문 내에 박스 형태의 접속 정보(안내 멘트 등)를 넣을 것.
            4. 일본어 문법/표현에 대한 **예문 10개** (반드시 한국어 해석과 핵심 단어 볼드처리 포함).
            5. 핵심 단어 정리 섹션 포함.
            6. 본문 중간 적절한 위치에 구글 애드센스 코드가 들어갈 자리() 삽입.
            7. 글 하단 푸터(Footer) 영역에 가벼운 복습 퀴즈와 공식 카페 링크 유도 문구를 포함할 것.
            `;
        } else {
            personaContext = "당신은 10년 차 전문 SEO 마케터이자 콘텐츠 기획자입니다.";
            formatRules = "H2, H3, 리스트 태그를 활용하여 가독성이 뛰어난 SEO 최적화 HTML 구조로 작성하세요.";
        }

        // 2. 통합 프롬프트 생성 (분석 + 작성 한 번에 처리하여 API 호출 최소화)
        const prompt = `
        ${personaContext}
        
        [작업 지시사항]
        타겟 키워드: '${keyword}'
        사용자가 제공한 핵심 정보 소스: '${sourceInfo}'

        위 키워드와 정보 소스를 바탕으로 다음 두 가지를 순서대로 명확히 구분하여 출력해주세요.

        ---분석 및 기획---
        1. 현재 이 키워드로 검색하는 사람들의 검색 의도(Intent) 파악.
        2. 제공된 정보 소스를 활용하여 경쟁 글과 차별화할 수 있는 '콘텐츠 컨셉(Angle)'.
        3. 추천 목차.

        ---본문 HTML---
        ${formatRules}
        (마크다운 \`\`\`html 블록 안에 작성된 완성된 코드만 출력할 것)
        `;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const textResult = data.candidates[0].content.parts[0].text;

            // 결과 파싱 (분석 부분과 HTML 부분을 정규식으로 분리)
            const htmlMatch = textResult.match(/```html\n([\s\S]*?)```/);
            let htmlContent = htmlMatch ? htmlMatch[1] : "HTML 코드를 추출하지 못했습니다. 결과를 다시 확인해주세요.";
            let analysisContent = textResult.replace(/```html\n[\s\S]*?```/, '').trim();

            document.getElementById('analysisOutput').value = analysisContent;
            document.getElementById('blogOutput').value = htmlContent;
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'block';

        } catch (error) {
            console.error("API 호출 에러:", error);
            alert("글을 생성하는 중 오류가 발생했습니다. API 키나 네트워크 상태를 확인해주세요.");
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>

</body>
</html>
